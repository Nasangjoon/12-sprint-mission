<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사용자 리스트</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-content">
                <div class="header-left">
                    <div class="logo-circle">
                        <i class="fa-solid fa-users-viewfinder"></i>
                    </div>
                    <div class="title-group">
                        <h1>사용자 리스트</h1>
                        <p id="userCount" class="sub-text">멤버 로딩 중...</p>
                    </div>
                </div>
                
                <div class="search-container">
                    <div class="search-wrapper">
                        <i class="fa-solid fa-magnifying-glass search-icon"></i>
                        <input type="text" id="searchInput" placeholder="이름 또는 이메일로 검색해보세요" autocomplete="off">
                        <button id="clearSearch" class="clear-btn" title="검색어 지우기">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                    </div>
                </div>
            </div>
        </header>
        
        <main class="app-main">
            <div id="userGrid" class="user-grid">
                <!-- 사용자 카드가 여기에 동적으로 생성됩니다 -->
                <div class="status-message">
                    <div class="spinner"></div>
                    <p>사용자 정보를 동기화하고 있습니다...</p>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
